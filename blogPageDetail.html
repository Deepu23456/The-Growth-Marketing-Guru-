<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details - Growth Marketing Guru</title>
    <link rel="icon" href="./assets/logo.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            color: #1f2937;
            margin: 0;
            padding: 20px;
        }

        .blog-details {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: #fff;
        }

        #backBtn {
            margin-bottom: 20px;
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }

        #backBtn:hover {
            background-color: #0056b3;
        }

        #blogTitle {
            margin-bottom: 20px;
            font-size: 32px;
            line-height: 1.2;
        }

        .blog-meta {
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }

        #blogContent {
            font-size: 16px;
            line-height: 1.7;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .blog-details {
                margin: 40px auto;
                padding: 18px;
            }

            #blogTitle {
                font-size: 28px;
            }

            #blogContent {
                font-size: 15px;
            }
        }

        @media (max-width: 600px) {
            .blog-details {
                margin: 20px 15px;
                padding: 15px;
            }

            #backBtn {
                padding: 6px 12px;
                font-size: 13px;
            }

            #blogTitle {
                font-size: 24px;
            }

            .blog-meta {
                font-size: 13px;
            }

            #blogContent {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <section class="blog-details"
        style="max-width:800px;margin:50px auto;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,0.1);border-radius:10px;background:#fff;">
        <button id="backBtn"
            style="margin-bottom:20px;padding:8px 15px;font-size:14px;border:none;border-radius:5px;background-color:#007bff;color:#fff;cursor:pointer;">←
            Back</button>
        <h1 id="blogTitle" style="margin-bottom:20px;">Loading...</h1>
        <p class="blog-meta" style="margin-bottom:20px;">By <span id="blogAuthor"></span> | <span id="blogDate"></span>
        </p>
        <p id="blogContent"></p>
    </section>

    <script type="module" src="./js/blogPageDetail.js"></script>
</body>

</html>
