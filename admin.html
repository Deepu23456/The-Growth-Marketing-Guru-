<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | Growth Marketing Guru</title>
    <link rel="icon" href="./assets/logo.jpg" type="image/png">

    <link rel="stylesheet" href="./css/admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            <img src="./assets/user.png" alt="user png">
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <!-- <li id="logoutBtn">Logout</li> -->

    <!-- DASHBOARD TITLE -->

    <section class="page-header">

        <h1>Admin Dashboard</h1>

        <p>Create and manage blog posts</p>

    </section>


    <!-- BLOG CREATION FORM -->

    <section class="admin-panel">

        <h2>Create New Blog</h2>

        <form id="blogForm">

            <input type="text" id="blogTitle" placeholder="Blog Title" required>

            <input type="text" id="blogAuthor" placeholder="Author Name" required>

            <textarea id="blogContent" placeholder="Write your blog content..." rows="8" required></textarea>

            <button type="submit">Publish Blog</button>

        </form>

    </section>


    <!-- BLOG LIST -->

    <section class="blogs">

        <h2 style="text-align:center;margin-bottom:30px;">All Blogs</h2>

        <div class="blog-container" id="admin-blog-container">


            <!-- <div class="blog-card" >

                <h3>Sample Blog Title</h3>

                <p>This is a sample blog preview text.</p>

                <button>Edit</button>
                <button>Delete</button>

            </div> -->


        </div>

    </section>


    <footer class="site-footer">
        <div class="footer-container">

            <!-- Platform Name -->
            <div class="footer-section">
                <h2>The Growth Marketing Guru</h2>
            </div>

            <!-- Quick Links -->
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="blogs.html">Blogs</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </div>

            <!-- Resources -->
            <div class="footer-section">
                <h3>Resources</h3>
                <ul>
                    <li><a href="#">SEO Guides</a></li>
                    <li><a href="#">Marketing Tools</a></li>
                </ul>
            </div>

            <!-- Follow Us -->
            <div class="footer-section">
                <h3>Follow Us</h3>
                <ul class="socials">
                    <li><a href="#">Instagram</a></li>
                    <li><a href="#">LinkedIn</a></li>
                    <li><a href="#">YouTube</a></li>
                </ul>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 The Growth Marketing Guru</p>
        </div>
    </footer>

</body>
<script type="module" src="./js/adminProtect.js"></script>
